name: Android CI

on:
  push:
    branches: [ "main", "master", "dev" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------
  # Build job (matrix: debug + release)
  # -------------------------------------------------------------------------
  build:
    name: Build APK (${{ matrix.build_type }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        build_type: [debug, release]

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout with full submodule tree
      #    xenia-upstream is a large repo (~500 MB); we use a shallow clone of
      #    it to keep CI times reasonable while still having all source files.
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false   # we initialise submodules manually below

      - name: Initialise xenia-upstream submodule (shallow)
        run: |
          git submodule init
          # Shallow clone the upstream — depth 1 is enough for building
          git submodule update --depth 1 --jobs 4 xenia-upstream

      - name: Symlink src/ and third_party/ from submodule
        run: bash setup.sh

      # -----------------------------------------------------------------------
      # 2. Java / JDK
      # -----------------------------------------------------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # -----------------------------------------------------------------------
      # 3. Android SDK + NDK r26
      # -----------------------------------------------------------------------
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK r26 and CMake 3.22
        run: |
          sdkmanager \
            "ndk;26.1.10909125" \
            "cmake;3.22.1" \
            --sdk_root=$ANDROID_SDK_ROOT
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/26.1.10909125" >> $GITHUB_ENV

      # -----------------------------------------------------------------------
      # 4. Caches
      # -----------------------------------------------------------------------
      - name: Cache Gradle wrapper
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper
          key: gradle-wrapper-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}

      - name: Cache Gradle caches
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Cache NDK / CMake build outputs
        uses: actions/cache@v4
        with:
          path: app/.cxx
          key: ndk-cxx-${{ runner.os }}-${{ matrix.build_type }}-${{ hashFiles('app/src/main/cpp/**', 'src/**/*.cc', 'src/**/*.h', 'third_party/**/*.cc', 'third_party/**/*.c') }}
          restore-keys: |
            ndk-cxx-${{ runner.os }}-${{ matrix.build_type }}-

      # -----------------------------------------------------------------------
      # 5. Build
      # -----------------------------------------------------------------------
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build ${{ matrix.build_type }} APK
        run: |
          if [ "${{ matrix.build_type }}" = "release" ]; then
            ./gradlew assembleRelease --no-daemon --stacktrace
          else
            ./gradlew assembleDebug --no-daemon --stacktrace
          fi

      # -----------------------------------------------------------------------
      # 6. Upload APK
      # -----------------------------------------------------------------------
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xenia-android-${{ matrix.build_type }}-${{ github.sha }}
          path: app/build/outputs/apk/${{ matrix.build_type }}/*.apk
          retention-days: 14

      # -----------------------------------------------------------------------
      # 7. Release symbols (release builds only)
      # -----------------------------------------------------------------------
      - name: Upload symbols
        if: matrix.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: xenia-android-symbols-${{ github.sha }}
          path: |
            app/build/outputs/mapping/release/mapping.txt
            app/build/intermediates/merged_native_libs/release/**/*.so
          retention-days: 14
        continue-on-error: true

  # -------------------------------------------------------------------------
  # Lint (runs in parallel, no C++ needed)
  # -------------------------------------------------------------------------
  lint:
    name: Android Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false   # lint doesn't need C++ source

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run lint
        run: |
          # Create stub symlinks so Gradle doesn't fail resolving CMakeLists
          mkdir -p src third_party
          ./gradlew lintDebug --no-daemon

      - name: Upload lint report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 7
